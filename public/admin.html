<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f0c29; color: #fff; }
        .navbar {
            position: fixed; top: 0; width: 100%; z-index: 100;
            background: linear-gradient(135deg, #1a0a2e, #302b63);
            border-bottom: 2px solid #764ba2;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0.6rem 2rem;
        }
        .navbar .brand { display: flex; align-items: center; gap: 0.7rem; }
        .navbar .brand img { width: 42px; height: 42px; border-radius: 50%; }
        .navbar .brand span { font-size: 1.15rem; font-weight: bold; }
        .navbar nav { display: flex; gap: 0.3rem; }
        .navbar nav a, .navbar nav button {
            color: rgba(255,255,255,0.8); text-decoration: none;
            padding: 0.5rem 1.2rem; border-radius: 6px; font-size: 0.95rem;
            background: transparent; border: none; cursor: pointer;
            transition: background 0.3s, color 0.3s;
        }
        .navbar nav a:hover, .navbar nav button:hover { background: rgba(255,255,255,0.1); color: #fff; }

        .container { max-width: 1100px; margin: 80px auto 2rem; padding: 0 1.5rem; }
        h1 { font-size: 1.6rem; margin-bottom: 1.5rem; }

        .tabs {
            display: flex; gap: 0.5rem; margin-bottom: 1.5rem;
        }
        .tabs button {
            padding: 0.6rem 1.5rem; border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px; background: transparent; color: rgba(255,255,255,0.6);
            cursor: pointer; font-size: 0.95rem; transition: all 0.3s;
        }
        .tabs button.active {
            background: rgba(118,75,162,0.4); color: #fff; border-color: #764ba2;
        }

        .actions { display: flex; gap: 0.8rem; margin-bottom: 2rem; }
        .btn {
            padding: 0.6rem 1.5rem; border: none; border-radius: 8px;
            font-size: 0.9rem; cursor: pointer; transition: transform 0.2s;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn-download { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }

        .chart-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 2rem;
        }
        .chart-card {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; padding: 1.2rem;
        }
        .chart-card h3 { font-size: 0.95rem; margin-bottom: 0.8rem; color: rgba(255,255,255,0.8); }
        .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.8rem; }
        .chart-header h3 { margin-bottom: 0; }
        .btn-sm {
            padding: 0.3rem 0.7rem; font-size: 0.75rem; border: none; border-radius: 6px;
            background: rgba(118,75,162,0.4); color: rgba(255,255,255,0.8); cursor: pointer;
            transition: background 0.3s;
        }
        .btn-sm:hover { background: rgba(118,75,162,0.7); }

        .stats {
            display: flex; gap: 1.5rem; margin-bottom: 2rem; flex-wrap: wrap;
        }
        .stat-card {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; padding: 1.2rem 1.5rem; flex: 1; min-width: 150px; text-align: center;
        }
        .stat-card .num { font-size: 2rem; font-weight: bold; color: #764ba2; }
        .stat-card .label { font-size: 0.85rem; color: rgba(255,255,255,0.5); margin-top: 0.3rem; }

        .no-data { text-align: center; color: rgba(255,255,255,0.4); padding: 3rem; font-size: 1.1rem; }

        @media (max-width: 700px) {
            .navbar { padding: 0.5rem 1rem; }
            .navbar .brand span { font-size: 0.95rem; }
            .tabs { flex-wrap: wrap; }
            .tabs button { padding: 0.5rem 0.8rem; font-size: 0.8rem; }
            .actions { flex-wrap: wrap; }
            .chart-grid { grid-template-columns: 1fr; }
            .stats { gap: 0.8rem; }
            .stat-card { min-width: 100px; padding: 0.8rem; }
            .stat-card .num { font-size: 1.4rem; }
            .stat-card .label { font-size: 0.75rem; }
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="brand">
        <img src="https://media.licdn.com/dms/image/v2/D560BAQE0gkaI7igpTQ/company-logo_200_200/company-logo_200_200/0/1714675006411?e=2147483647&v=beta&t=FOBBkM2wfmBgrmITordnRweYfk-42d1BO9ccRoDquS0" alt="Logo">
        <span>Admin Dashboard</span>
    </div>
    <nav>
        <button onclick="localStorage.removeItem('user'); location.href='index.html'">Logout</button>
    </nav>
</div>

<div class="container">
    <h1>📊 Feedback Analytics</h1>

    <div class="tabs">
        <button class="active" onclick="switchType('department')">Department Feedback</button>
        <button onclick="switchType('institution')">Institution Feedback</button>
        <button onclick="switchType('parents')">Parents Feedback</button>
        <button onclick="switchType('exit')">Exit Feedback</button>
    </div>

    <div class="actions">
        <button class="btn btn-download" onclick="downloadCsv()">⬇ Download CSV</button>
        <button class="btn btn-download" onclick="downloadPDF()">📄 Download PDF</button>
    </div>

    <div id="content"></div>
</div>

<script>
    const user = JSON.parse(localStorage.getItem('user') || 'null');
    if (!user || user.role !== 'admin') window.location.href = 'index.html';

    let currentType = 'department';
    let charts = [];

    const typeIndex = { department: 0, institution: 1, parents: 2, exit: 3 };

    function switchType(type) {
        currentType = type;
        document.querySelectorAll('.tabs button').forEach((b, i) =>
            b.classList.toggle('active', i === typeIndex[type])
        );
        loadData();
    }

    function downloadCsv() {
        window.location.href = '/api/admin/download/' + currentType;
    }

    async function downloadChartPDF(cardId, title) {
        const card = document.getElementById(cardId);
        const canvas = await html2canvas(card, { scale: 2, backgroundColor: '#0f0c29' });
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('landscape', 'mm', 'a4');
        const pageW = pdf.internal.pageSize.getWidth();
        const pageH = pdf.internal.pageSize.getHeight();
        const ratio = Math.min((pageW - 20) / canvas.width, (pageH - 20) / canvas.height);
        const imgW = canvas.width * ratio;
        const imgH = canvas.height * ratio;
        pdf.addImage(canvas.toDataURL('image/png'), 'PNG', (pageW - imgW) / 2, (pageH - imgH) / 2, imgW, imgH);
        pdf.save(`${title.replace(/\s+/g, '_')}_${currentType}.pdf`);
    }

    async function downloadPDF() {
        const content = document.getElementById('content');
        const canvas = await html2canvas(content, { scale: 2, backgroundColor: '#0f0c29' });
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('landscape', 'mm', 'a4');
        const pageW = pdf.internal.pageSize.getWidth();
        const pageH = pdf.internal.pageSize.getHeight();
        const imgW = pageW - 20;
        const imgH = (canvas.height * imgW) / canvas.width;
        const imgData = canvas.toDataURL('image/png');
        let y = 10;
        const pages = Math.ceil(imgH / (pageH - 20));
        for (let i = 0; i < pages; i++) {
            if (i > 0) pdf.addPage();
            pdf.addImage(imgData, 'PNG', 10, y - i * (pageH - 20), imgW, imgH);
        }
        pdf.save(`feedback_${currentType}_charts.pdf`);
    }

    function destroyCharts() {
        charts.forEach(c => c.destroy());
        charts = [];
    }

    function makeChart(canvasId, label, labels, data, type = 'bar') {
        const ctx = document.getElementById(canvasId).getContext('2d');
        const colors = ['#667eea', '#764ba2', '#f093fb', '#f5576c', '#4facfe', '#43e97b', '#fa709a', '#fee140'];
        const opts = {
            responsive: true,
            plugins: { legend: { display: type === 'pie' || type === 'doughnut', labels: { color: 'rgba(255,255,255,0.7)', font: { size: 11 } } } }
        };
        if (type === 'bar' || type === 'horizontalBar') {
            opts.indexAxis = type === 'horizontalBar' ? 'y' : 'x';
            opts.scales = {
                y: { beginAtZero: true, ticks: { color: 'rgba(255,255,255,0.5)' }, grid: { color: 'rgba(255,255,255,0.05)' } },
                x: { beginAtZero: true, ticks: { color: 'rgba(255,255,255,0.5)' }, grid: { color: 'rgba(255,255,255,0.05)' } }
            };
        }
        const c = new Chart(ctx, {
            type: type === 'horizontalBar' ? 'bar' : type,
            data: {
                labels,
                datasets: [{ label, data, backgroundColor: colors.slice(0, labels.length), borderRadius: type === 'bar' || type === 'horizontalBar' ? 6 : 0 }]
            },
            options: opts
        });
        charts.push(c);
    }

    function countMultiSelect(rows, field) {
        const counts = {};
        rows.forEach(r => {
            if (!r[field]) return;
            r[field].split(', ').forEach(v => { v = v.trim(); if (v) counts[v] = (counts[v] || 0) + 1; });
        });
        return counts;
    }

    function countField(rows, field) {
        const counts = {};
        rows.forEach(r => { const v = r[field]; if (v) counts[v] = (counts[v] || 0) + 1; });
        return counts;
    }

    function avgByRating(rows, field) {
        const counts = [0, 0, 0, 0, 0];
        rows.forEach(r => { const v = parseInt(r[field]); if (v >= 1 && v <= 5) counts[v - 1]++; });
        return counts;
    }

    async function loadData() {
        destroyCharts();
        const res = await fetch('/api/admin/feedback/' + currentType);
        const { data } = await res.json();
        const el = document.getElementById('content');

        if (!data.length) {
            el.innerHTML = '<div class="no-data">No feedback responses yet.</div>';
            return;
        }

        const ratingFieldsMap = {
            department: [['education_quality', 'Education Quality'], ['faculty_satisfaction', 'Faculty Satisfaction'], ['labs_rating', 'Labs Rating'], ['department_activities', 'Dept Activities'], ['faculty_bonding', 'Faculty Bonding']],
            institution: [['education_quality', 'Education Quality'], ['faculty_satisfaction', 'Faculty Satisfaction'], ['infrastructure_rating', 'Infrastructure']],
            parents: [['teaching_learning', 'Teaching Learning'], ['students_interaction', 'Students Interaction'], ['academic_facilities', 'Academic Facilities'], ['students_discipline', 'Students Discipline'], ['overall_facilities', 'Overall Facilities'], ['career_guidance', 'Career Guidance']],
            exit: [['online_admission_process', 'Online Admission'], ['institution_infrastructure', 'Infrastructure'], ['canteen_facilities', 'Canteen'], ['washroom_facilities', 'Washroom'], ['library_facilities', 'Library'], ['hostel_facilities', 'Hostel'], ['placement_facilities', 'Placement'], ['student_graviance', 'Grievance Handling'], ['course_curriculum', 'Course Curriculum'], ['practical_training', 'Practical Training'], ['computer_labs', 'Computer Labs'], ['student_centric_activities', 'Student Activities'], ['student_faculty_bonding', 'Faculty Bonding'], ['overall_rating', 'Overall Rating']]
        };
        const ratingFields = ratingFieldsMap[currentType];

        // Stats
        const avgAll = ratingFields.map(([f]) => {
            const vals = data.map(r => parseInt(r[f])).filter(v => v >= 1 && v <= 5);
            return vals.length ? (vals.reduce((a, b) => a + b, 0) / vals.length).toFixed(1) : '-';
        });

        let html = '<div class="stats">';
        html += `<div class="stat-card"><div class="num">${data.length}</div><div class="label">Total Responses</div></div>`;
        ratingFields.forEach(([, label], i) => {
            html += `<div class="stat-card"><div class="num">${avgAll[i]}</div><div class="label">Avg ${label}</div></div>`;
        });
        html += '</div>';

        // Checkbox/multi-select fields per type
        const checkboxFieldsMap = {
            department: [['improvements', 'Areas for Improvement']],
            institution: [['improvements', 'Areas for Improvement']],
            parents: [['placement_drive', 'Placement Drive'], ['internship_program', 'Internship Program'], ['extracurricular_activities', 'Extracurricular Activities'], ['curriculum_satisfaction', 'Curriculum Satisfaction']],
            exit: [['improvements', 'Areas for Improvement']]
        };
        const checkboxFields = checkboxFieldsMap[currentType] || [];

        // Rating charts
        html += '<div class="chart-grid">';
        ratingFields.forEach(([f, label], i) => {
            html += `<div class="chart-card" id="card_chart${i}"><div class="chart-header"><h3>${label} Distribution</h3><button class="btn-sm" onclick="downloadChartPDF('card_chart${i}','${label}')">📄 PDF</button></div><canvas id="chart${i}"></canvas></div>`;
        });

        // Department breakdown pie chart
        html += `<div class="chart-card" id="card_chartDept"><div class="chart-header"><h3>Department Breakdown</h3><button class="btn-sm" onclick="downloadChartPDF('card_chartDept','Department Breakdown')">📄 PDF</button></div><canvas id="chartDept"></canvas></div>`;

        // Checkbox field charts
        checkboxFields.forEach(([f, label], i) => {
            html += `<div class="chart-card" id="card_cbChart${i}"><div class="chart-header"><h3>${label}</h3><button class="btn-sm" onclick="downloadChartPDF('card_cbChart${i}','${label}')">📄 PDF</button></div><canvas id="cbChart${i}"></canvas></div>`;
        });
        html += '</div>';

        el.innerHTML = html;

        // Render rating charts
        ratingFields.forEach(([f, label], i) => {
            makeChart('chart' + i, label, ['1-Poor', '2-Avg', '3-Good', '4-VGood', '5-Excellent'], avgByRating(data, f));
        });

        // Render department pie
        const deptCounts = countField(data, 'department');
        makeChart('chartDept', 'Department', Object.keys(deptCounts), Object.values(deptCounts), 'doughnut');

        // Render checkbox charts
        checkboxFields.forEach(([f, label], i) => {
            const counts = countMultiSelect(data, f);
            makeChart('cbChart' + i, label, Object.keys(counts), Object.values(counts), 'horizontalBar');
        });
    }

    loadData();
</script>
</body>
</html>
