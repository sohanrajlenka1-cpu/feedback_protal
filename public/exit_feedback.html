<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exit Student Feedback</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh; padding: 2rem 1rem;
        }
        .container {
            background: white; padding: 2rem; border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); max-width: 700px; margin: 0 auto;
        }
        h1 { text-align: center; color: #1e3c72; margin-bottom: 0.5rem; }
        .logo { display: block; width: 70px; height: 70px; border-radius: 50%; margin: 0 auto 1rem; }
        .subtitle { text-align: center; color: #666; margin-bottom: 2rem; font-size: 0.9rem; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; color: #333; font-weight: bold; }
        .required { color: red; }
        input, select, textarea {
            width: 100%; padding: 0.75rem; border: 2px solid #ddd;
            border-radius: 5px; font-size: 1rem;
        }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #2a5298; }
        textarea { resize: vertical; min-height: 100px; }
        .checkbox-group { display: flex; flex-direction: column; gap: 0.5rem; }
        .checkbox-group label { font-weight: normal; display: flex; align-items: center; gap: 0.5rem; }
        .checkbox-group input { width: auto; }
        .rating-scale { display: flex; justify-content: space-between; gap: 0.5rem; flex-wrap: wrap; }
        .rating-option { flex: 1; min-width: 60px; text-align: center; }
        .rating-option input { width: auto; margin-bottom: 0.25rem; }
        .rating-option label { font-weight: normal; font-size: 0.85rem; }
        .btn {
            background: linear-gradient(135deg, #d24419 0%, #2a5298 100%);
            color: rgba(255, 255, 255, 0.689); padding: 0.75rem 2rem;
            border: none; border-radius: 5px; font-size: 1rem;
            cursor: pointer; width: 100%; margin-top: 1rem;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        @media (max-width: 500px) {
            .container { padding: 1.2rem; }
            h1 { font-size: 1.2rem; }
            .rating-scale { flex-wrap: wrap; gap: 0.3rem; }
            .rating-option { min-width: 45px; flex: none; width: 18%; }
            .rating-option label { font-size: 0.7rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <img class="logo" src="https://media.licdn.com/dms/image/v2/D560BAQE0gkaI7igpTQ/company-logo_200_200/company-logo_200_200/0/1714675006411?e=2147483647&v=beta&t=FOBBkM2wfmBgrmITordnRweYfk-42d1BO9ccRoDquS0" alt="Logo">
        <h1>Exit Student Feedback Form</h1>
        <p class="subtitle">Share your overall experience as a graduating student</p>

        <form id="exitForm">
            <div class="form-group">
                <label>Name <span class="required">*</span></label>
                <input type="text" name="name" required>
            </div>
            <div class="form-group">
                <label>Email <span class="required">*</span></label>
                <input type="email" name="email" required>
            </div>
            <div class="form-group">
                <label>Registration Number <span class="required">*</span></label>
                <input type="text" name="registration_number" required>
            </div>
            <div class="form-group">
                <label>Department <span class="required">*</span></label>
                <select name="department" required>
                    <option value="">Select Department</option>
                    <option value="ARCHITECTURAL ASSISTANTSHIP">ARCHITECTURAL ASSISTANTSHIP</option>
                    <option value="BEAUTY CULTURE">BEAUTY CULTURE</option>
                    <option value="CIVIL ENGINEERING">CIVIL ENGINEERING</option>
                    <option value="ELECTRICAL ENGINEERING">ELECTRICAL ENGINEERING</option>
                    <option value="ELECTRONICS & TELECOMMUNICATION ENGINEERING">ELECTRONICS & TELECOMMUNICATION ENGINEERING</option>
                    <option value="PHARMACY">PHARMACY</option>
                    <option value="INFORMATION TECHNOLOGY">INFORMATION TECHNOLOGY</option>
                    <option value="MODERN OFFICE MANAGEMENT">MODERN OFFICE MANAGEMENT</option>
                    <option value="MECHANICAL ENGINEERING">MECHANICAL ENGINEERING</option>
                    <option value="OTHER">OTHER</option>
                </select>
            </div>
            <div class="form-group">
                <label>Year of Passing <span class="required">*</span></label>
                <select name="year_of_passing" required>
                    <option value="">Select Year</option>
                    <option value="2025">2025</option>
                    <option value="2026">2026</option>
                    <option value="2027">2027</option>
                </select>
            </div>

            <div class="form-group">
                <label>1.EASE OF HAVING ONLINE ADMISSION PROCESS?<span class="required">*</span></label>
                <div class="rating-scale">
                    <div class="rating-option"><input type="radio" name="online_admission_process" value="1" id="q1_1" required><label for="q1_1">1 - Poor</label></div>
                    <div class="rating-option"><input type="radio" name="online_admission_process" value="2" id="q1_2"><label for="q1_2">2 - Average</label></div>
                    <div class="rating-option"><input type="radio" name="online_admission_process" value="3" id="q1_3"><label for="q1_3">3 - Good</label></div>
                    <div class="rating-option"><input type="radio" name="online_admission_process" value="4" id="q1_4"><label for="q1_4">4 - Very Good</label></div>
                    <div class="rating-option"><input type="radio" name="online_admission_process" value="5" id="q1_5"><label for="q1_5">5 - Excellent</label></div>
                </div>
            </div>

            <div class="form-group">
                <label>2.INSTITUTION INFRASTRUCTURE?<span class="required">*</span></label>
                <div class="rating-scale">
                    <div class="rating-option"><input type="radio" name="institution_infrastructure" value="1" id="q2_1" required><label for="q2_1">1 - Poor</label></div>
                    <div class="rating-option"><input type="radio" name="institution_infrastructure" value="2" id="q2_2"><label for="q2_2">2 - Average</label></div>
                    <div class="rating-option"><input type="radio" name="institution_infrastructure" value="3" id="q2_3"><label for="q2_3">3 - Good</label></div>
                    <div class="rating-option"><input type="radio" name="institution_infrastructure" value="4" id="q2_4"><label for="q2_4">4 - Very Good</label></div>
                    <div class="rating-option"><input type="radio" name="institution_infrastructure" value="5" id="q2_5"><label for="q2_5">5 - Excellent</label></div>
                </div>
            </div>

            <div class="form-group">
                <label>3.CANTEEN FACILITIES?<span class="required">*</span></label>
                <div class="rating-scale">
                    <div class="rating-option"><input type="radio" name="canteen_facilities" value="1" id="q3_1" required><label for="q3_1">1 - Poor</label></div>
                    <div class="rating-option"><input type="radio" name="canteen_facilities" value="2" id="q3_2"><label for="q3_2">2 - Average</label></div>
                    <div class="rating-option"><input type="radio" name="canteen_facilities" value="3" id="q3_3"><label for="q3_3">3 - Good</label></div>
                    <div class="rating-option"><input type="radio" name="canteen_facilities" value="4" id="q3_4"><label for="q3_4">4 - Very Good</label></div>
                    <div class="rating-option"><input type="radio" name="canteen_facilities" value="5" id="q3_5"><label for="q3_5">5 - Excellent</label></div>
                </div>
            </div>

            <div class="form-group">
                <label>4.WASHROOM FACILITIES? <span class="required">*</span></label>
                <div class="rating-scale">
                    <div class="rating-option"><input type="radio" name="washroom_facilities" value="1" id="q4_1" required><label for="q4_1">1 - Poor</label></div>
                    <div class="rating-option"><input type="radio" name="washroom_facilities" value="2" id="q4_2"><label for="q4_2">2 - Average</label></div>
                    <div class="rating-option"><input type="radio" name="washroom_facilities" value="3" id="q4_3"><label for="q4_3">3 - Good</label></div>
                    <div class="rating-option"><input type="radio" name="washroom_facilities" value="4" id="q4_4"><label for="q4_4">4 - Very Good</label></div>
                    <div class="rating-option"><input type="radio" name="washroom_facilities" value="5" id="q4_5"><label for="q4_5">5 - Excellent</label></div>
                </div>
            </div>

            <div class="form-group">
                <label>5.LIBRARY FACILITIES? <span class="required">*</span></label>
                <div class="rating-scale">
                    <div class="rating-option"><input type="radio" name="library_facilities" value="1" id="q5_1" required><label for="q5_1">1 - Never</label></div>
                    <div class="rating-option"><input type="radio" name="library_facilities" value="2" id="q5_2"><label for="q5_2">2 - Unlikely</label></div>
                    <div class="rating-option"><input type="radio" name="library_facilities" value="3" id="q5_3"><label for="q5_3">3 - Maybe</label></div>
                    <div class="rating-option"><input type="radio" name="library_facilities" value="4" id="q5_4"><label for="q5_4">4 - Likely</label></div>
                    <div class="rating-option"><input type="radio" name="library_facilities" value="5" id="q5_5"><label for="q5_5">5 - Excellent</label></div>
                </div>
            </div>

             <div class="form-group">
                <label>6.HOSTEL FACILITIES? <span class="required">*</span></label>
                <div class="rating-scale">
                    <div class="rating-option"><input type="radio" name="hostel_facilities" value="1" id="q6_1" required><label for="q6_1">1 - Never</label></div>
                    <div class="rating-option"><input type="radio" name="hostel_facilities" value="2" id="q6_2"><label for="q6_2">2 - Unlikely</label></div>
                    <div class="rating-option"><input type="radio" name="hostel_facilities" value="3" id="q6_3"><label for="q6_3">3 - Maybe</label></div>
                    <div class="rating-option"><input type="radio" name="hostel_facilities" value="4" id="q6_4"><label for="q6_4">4 - Likely</label></div>
                    <div class="rating-option"><input type="radio" name="hostel_facilities" value="5" id="q6_5"><label for="q6_5">5 - Excellent</label></div>
                </div>
            </div>

            <div class="form-group">
                <label>7.What areas need improvement? (Select all that apply)</label>
                <div class="checkbox-group">
                    <label><input type="checkbox" name="improvements" value="Placement Cell"> Placement Cell</label>
                    <label><input type="checkbox" name="improvements" value="Curriculum Update"> Curriculum Update</label>
                    <label><input type="checkbox" name="improvements" value="Industry Exposure & Training"> Industry Exposure & Training</label>
                    <label><input type="checkbox" name="improvements" value="Skill Development"> Skill Development</label>
                    <label><input type="checkbox" name="improvements" value="Infrastructure"> Infrastructure</label>
                    <label><input type="checkbox" name="improvements" value="Internship Opportunities"> Internship Opportunities</label>
                </div>
            </div>

             <div class="form-group">
                <label>8.PLACEMENT FACILITIES AND CAREER SUPPORT? <span class="required">*</span></label>
                <div class="rating-scale">
                    <div class="rating-option"><input type="radio" name="placement_facilities" value="1" id="q7_1" required><label for="q7_1">1 - Never</label></div>
                    <div class="rating-option"><input type="radio" name="placement_facilities" value="2" id="q7_2"><label for="q7_2">2 - Unlikely</label></div>
                    <div class="rating-option"><input type="radio" name="placement_facilities" value="3" id="q7_3"><label for="q7_3">3 - Maybe</label></div>
                    <div class="rating-option"><input type="radio" name="placement_facilities" value="4" id="q7_4"><label for="q7_4">4 - Likely</label></div>
                    <div class="rating-option"><input type="radio" name="placement_facilities" value="5" id="q7_5"><label for="q7_5">5 - Excellent</label></div>
                </div>
            </div>

                 <div class="form-group">
                <label>9.HANDLING OF STUDENTS GRAIVANCE? <span class="required">*</span></label>
                <div class="rating-scale">
                    <div class="rating-option"><input type="radio" name="student_graviance" value="1" id="q8_1" required><label for="q8_1">1 - Never</label></div>
                    <div class="rating-option"><input type="radio" name="student_graviance" value="2" id="q8_2"><label for="q8_2">2 - Unlikely</label></div>
                    <div class="rating-option"><input type="radio" name="student_graviance" value="3" id="q8_3"><label for="q8_3">3 - Maybe</label></div>
                    <div class="rating-option"><input type="radio" name="student_graviance" value="4" id="q8_4"><label for="q8_4">4 - Likely</label></div>
                    <div class="rating-option"><input type="radio" name="student_graviance" value="5" id="q8_5"><label for="q8_5">5 - Excellent</label></div>
                </div>
            </div>

             <div class="form-group">
                <label>10.QULITY OF COURSE CURRICULUM? <span class="required">*</span></label>
                <div class="rating-scale">
                    <div class="rating-option"><input type="radio" name="course_curriculum" value="1" id="q9_1" required><label for="q9_1">1 - Never</label></div>
                    <div class="rating-option"><input type="radio" name="course_curriculum" value="2" id="q9_2"><label for="q9_2">2 - Unlikely</label></div>
                    <div class="rating-option"><input type="radio" name="course_curriculum" value="3" id="q9_3"><label for="q9_3">3 - Maybe</label></div>
                    <div class="rating-option"><input type="radio" name="course_curriculum" value="4" id="q9_4"><label for="q9_4">4 - Likely</label></div>
                    <div class="rating-option"><input type="radio" name="course_curriculum" value="5" id="q9_5"><label for="q9_5">5 - Excellent</label></div>
                </div>
            </div>

             <div class="form-group">
                <label>11.PRACTICAL TRAINING? <span class="required">*</span></label>
                <div class="rating-scale">
                    <div class="rating-option"><input type="radio" name="practical_training" value="1" id="q10_1" required><label for="q10_1">1 - Never</label></div>
                    <div class="rating-option"><input type="radio" name="practical_training" value="2" id="q10_2"><label for="q10_2">2 - Unlikely</label></div>
                    <div class="rating-option"><input type="radio" name="practical_training" value="3" id="q10_3"><label for="q10_3">3 - Maybe</label></div>
                    <div class="rating-option"><input type="radio" name="practical_training" value="4" id="q10_4"><label for="q10_4">4 - Likely</label></div>
                    <div class="rating-option"><input type="radio" name="practical_training" value="5" id="q10_5"><label for="q10_5">5 - Excellent</label></div>
                </div>
            </div>

             <div class="form-group">
                <label>12.AVAILABILITY OF COMPUTER LABS,WORKSHOP,COURSERELATED LABS? <span class="required">*</span></label>
                <div class="rating-scale">
                    <div class="rating-option"><input type="radio" name="computer_labs" value="1" id="q11_1" required><label for="q11_1">1 - Never</label></div>
                    <div class="rating-option"><input type="radio" name="computer_labs" value="2" id="q11_2"><label for="q11_2">2 - Unlikely</label></div>
                    <div class="rating-option"><input type="radio" name="computer_labs" value="3" id="q11_3"><label for="q11_3">3 - Maybe</label></div>
                    <div class="rating-option"><input type="radio" name="computer_labs" value="4" id="q11_4"><label for="q11_4">4 - Likely</label></div>
                    <div class="rating-option"><input type="radio" name="computer_labs" value="5" id="q11_5"><label for="q11_5">5 - Excellent</label></div>
                </div>
            </div>

             <div class="form-group">
                <label>13.STUDENT CENTRIC ACTIVITIES IN THE DEPARTMENT? <span class="required">*</span></label>
                <div class="rating-scale">
                    <div class="rating-option"><input type="radio" name="student_centric_activities" value="1" id="q12_1" required><label for="q12_1">1 - Never</label></div>
                    <div class="rating-option"><input type="radio" name="student_centric_activities" value="2" id="q12_2"><label for="q12_2">2 - Unlikely</label></div>
                    <div class="rating-option"><input type="radio" name="student_centric_activities" value="3" id="q12_3"><label for="q12_3">3 - Maybe</label></div>
                    <div class="rating-option"><input type="radio" name="student_centric_activities" value="4" id="q12_4"><label for="q12_4">4 - Likely</label></div>
                    <div class="rating-option"><input type="radio" name="student_centric_activities" value="5" id="q12_5"><label for="q12_5">5 - Excellent</label></div>
                </div>
            </div>

             <div class="form-group">
                <label>14.STUDENT-FACULTY BONDING? <span class="required">*</span></label>
                <div class="rating-scale">
                    <div class="rating-option"><input type="radio" name="student_faculty_bonding" value="1" id="q13_1" required><label for="q13_1">1 - Never</label></div>
                    <div class="rating-option"><input type="radio" name="student_faculty_bonding" value="2" id="q13_2"><label for="q13_2">2 - Unlikely</label></div>
                    <div class="rating-option"><input type="radio" name="student_faculty_bonding" value="3" id="q13_3"><label for="q13_3">3 - Maybe</label></div>
                    <div class="rating-option"><input type="radio" name="student_faculty_bonding" value="4" id="q13_4"><label for="q13_4">4 - Likely</label></div>
                    <div class="rating-option"><input type="radio" name="student_faculty_bonding" value="5" id="q13_5"><label for="q13_5">5 - Excellent</label></div>
                </div>
            </div>

             <div class="form-group">
                <label>15.OVERALL RATING? <span class="required">*</span></label>
                <div class="rating-scale">
                    <div class="rating-option"><input type="radio" name="overall_rating" value="1" id="q14_1" required><label for="q14_1">1 - Never</label></div>
                    <div class="rating-option"><input type="radio" name="overall_rating" value="2" id="q14_2"><label for="q14_2">2 - Unlikely</label></div>
                    <div class="rating-option"><input type="radio" name="overall_rating" value="3" id="q14_3"><label for="q14_3">3 - Maybe</label></div>
                    <div class="rating-option"><input type="radio" name="overall_rating" value="4" id="q14_4"><label for="q14_4">4 - Likely</label></div>
                    <div class="rating-option"><input type="radio" name="overall_rating" value="5" id="q14_5"><label for="q14_5">5 - Excellent</label></div>
                </div>
            </div>

            <div class="form-group">
                <label>Any suggestions or final thoughts?</label>
                <textarea name="comments" placeholder="Share your suggestions for future batches..."></textarea>
            </div>

            <button type="submit" class="btn">Submit Feedback</button>
        </form>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('user') || 'null');
        if (!user) window.location.href = 'index.html';

        const form = document.getElementById('exitForm');
        form.querySelector('input[name="name"]').value = user.name;
        form.querySelector('input[name="email"]').value = user.email;
        form.querySelector('input[name="registration_number"]').value = user.registration_no;
        form.querySelector('input[name="name"]').readOnly = true;
        form.querySelector('input[name="email"]').readOnly = true;
        form.querySelector('input[name="registration_number"]').readOnly = true;

        const ratingFields = ['online_admission_process','institution_infrastructure','canteen_facilities','washroom_facilities','library_facilities','hostel_facilities','placement_facilities','student_graviance','course_curriculum','practical_training','computer_labs','student_centric_activities','student_faculty_bonding','overall_rating'];

        // Load existing feedback
        fetch('/api/feedback/exit/' + encodeURIComponent(user.registration_no))
            .then(r => r.json())
            .then(({ feedback: fb }) => {
                if (!fb) return;
                form.querySelector('select[name="department"]').value = fb.department || '';
                form.querySelector('select[name="year_of_passing"]').value = fb.year_of_passing || '';
                ratingFields.forEach(n => { const r = form.querySelector(`input[name="${n}"][value="${fb[n]}"]`); if (r) r.checked = true; });
                if (fb.improvements) fb.improvements.split(', ').forEach(v => { const c = form.querySelector(`input[name="improvements"][value="${v}"]`); if (c) c.checked = true; });
                form.querySelector('textarea[name="comments"]').value = fb.comments || '';
            })
            .catch(() => {});

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            const data = {
                name: formData.get('name'),
                email: formData.get('email'),
                registration_number: formData.get('registration_number'),
                department: formData.get('department'),
                year_of_passing: formData.get('year_of_passing'),
                online_admission_process: parseInt(formData.get('online_admission_process')),
                institution_infrastructure: parseInt(formData.get('institution_infrastructure')),
                canteen_facilities: parseInt(formData.get('canteen_facilities')),
                washroom_facilities: parseInt(formData.get('washroom_facilities')),
                library_facilities: parseInt(formData.get('library_facilities')),
                hostel_facilities: parseInt(formData.get('hostel_facilities')),
                improvements: formData.getAll('improvements').join(', '),
                placement_facilities: parseInt(formData.get('placement_facilities')),
                student_graviance: parseInt(formData.get('student_graviance')),
                course_curriculum: parseInt(formData.get('course_curriculum')),
                practical_training: parseInt(formData.get('practical_training')),
                computer_labs: parseInt(formData.get('computer_labs')),
                student_centric_activities: parseInt(formData.get('student_centric_activities')),
                student_faculty_bonding: parseInt(formData.get('student_faculty_bonding')),
                overall_rating: parseInt(formData.get('overall_rating')),
                comments: formData.get('comments') || ''
            };
            try {
                const response = await fetch('/submit-exit-feedback', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                if (response.ok) window.location.href = 'success.html';
                else alert(result.error || 'Error submitting form');
            } catch (error) {
                alert('Server not running. Please start the server with: node server.js');
            }
        });
    </script>
</body>
</html>
