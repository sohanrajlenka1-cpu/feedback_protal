<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exit Student Feedback</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh; padding: 2rem 1rem;
        }
        .container {
            background: white; padding: 2rem; border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); max-width: 700px; margin: 0 auto;
        }
        h1 { text-align: center; color: #1e3c72; margin-bottom: 0.5rem; }
        .logo { display: block; width: 70px; height: 70px; border-radius: 50%; margin: 0 auto 1rem; }
        .subtitle { text-align: center; color: #666; margin-bottom: 2rem; font-size: 0.9rem; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; color: #333; font-weight: bold; }
        .required { color: red; }
        input, select, textarea {
            width: 100%; padding: 0.75rem; border: 2px solid #ddd;
            border-radius: 5px; font-size: 1rem;
        }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #2a5298; }
        textarea { resize: vertical; min-height: 100px; }
        .checkbox-group { display: flex; flex-direction: column; gap: 0.5rem; }
        .checkbox-group label { font-weight: normal; display: flex; align-items: center; gap: 0.5rem; }
        .checkbox-group input { width: auto; }
        .rating-scale { display: flex; justify-content: space-between; gap: 0.5rem; flex-wrap: wrap; }
        .rating-option { flex: 1; min-width: 60px; text-align: center; }
        .rating-option input { width: auto; margin-bottom: 0.25rem; }
        .rating-option label { font-weight: normal; font-size: 0.85rem; }
        .btn {
            background: linear-gradient(135deg, #d24419 0%, #2a5298 100%);
            color: rgba(255, 255, 255, 0.689); padding: 0.75rem 2rem;
            border: none; border-radius: 5px; font-size: 1rem;
            cursor: pointer; width: 100%; margin-top: 1rem;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <div class="container">
        <img class="logo" src="https://media.licdn.com/dms/image/v2/D560BAQE0gkaI7igpTQ/company-logo_200_200/company-logo_200_200/0/1714675006411?e=2147483647&v=beta&t=FOBBkM2wfmBgrmITordnRweYfk-42d1BO9ccRoDquS0" alt="Logo">
        <h1>Exit Student Feedback Form</h1>
        <p class="subtitle">Share your overall experience as a graduating student</p>

        <form id="exitForm">
            <div class="form-group">
                <label>Name <span class="required">*</span></label>
                <input type="text" name="name" required>
            </div>
            <div class="form-group">
                <label>Email <span class="required">*</span></label>
                <input type="email" name="email" required>
            </div>
            <div class="form-group">
                <label>Registration Number <span class="required">*</span></label>
                <input type="text" name="registration_number" required>
            </div>
            <div class="form-group">
                <label>Department <span class="required">*</span></label>
                <select name="department" required>
                    <option value="">Select Department</option>
                    <option value="ARCHITECTURAL ASSISTANTSHIP">ARCHITECTURAL ASSISTANTSHIP</option>
                    <option value="BEAUTY CULTURE">BEAUTY CULTURE</option>
                    <option value="CIVIL ENGINEERING">CIVIL ENGINEERING</option>
                    <option value="ELECTRICAL ENGINEERING">ELECTRICAL ENGINEERING</option>
                    <option value="ELECTRONICS & TELECOMMUNICATION ENGINEERING">ELECTRONICS & TELECOMMUNICATION ENGINEERING</option>
                    <option value="PHARMACY">PHARMACY</option>
                    <option value="INFORMATION TECHNOLOGY">INFORMATION TECHNOLOGY</option>
                    <option value="MODERN OFFICE MANAGEMENT">MODERN OFFICE MANAGEMENT</option>
                    <option value="MECHANICAL ENGINEERING">MECHANICAL ENGINEERING</option>
                    <option value="OTHER">OTHER</option>
                </select>
            </div>
            <div class="form-group">
                <label>Year of Passing <span class="required">*</span></label>
                <select name="year_of_passing" required>
                    <option value="">Select Year</option>
                    <option value="2025">2025</option>
                    <option value="2026">2026</option>
                    <option value="2027">2027</option>
                </select>
            </div>

            <div class="form-group">
                <label>Basic and Discipline Specific Knowledge coverage in syllabus?<span class="required">*</span></label>
                <div class="rating-scale">
                    <div class="rating-option"><input type="radio" name="basic_discipline_knowledge" value="1" id="q1_1" required><label for="q1_1">1 - Poor</label></div>
                    <div class="rating-option"><input type="radio" name="basic_discipline_knowledge" value="2" id="q1_2"><label for="q1_2">2 - Average</label></div>
                    <div class="rating-option"><input type="radio" name="basic_discipline_knowledge" value="3" id="q1_3"><label for="q1_3">3 - Good</label></div>
                    <div class="rating-option"><input type="radio" name="basic_discipline_knowledge" value="4" id="q1_4"><label for="q1_4">4 - Very Good</label></div>
                    <div class="rating-option"><input type="radio" name="basic_discipline_knowledge" value="5" id="q1_5"><label for="q1_5">5 - Excellent</label></div>
                </div>
            </div>

            <div class="form-group">
                <label>Growth and Analytical skills through the program?<span class="required">*</span></label>
                <div class="rating-scale">
                    <div class="rating-option"><input type="radio" name="growth_analytical_skills" value="1" id="q2_1" required><label for="q2_1">1 - Poor</label></div>
                    <div class="rating-option"><input type="radio" name="growth_analytical_skills" value="2" id="q2_2"><label for="q2_2">2 - Average</label></div>
                    <div class="rating-option"><input type="radio" name="growth_analytical_skills" value="3" id="q2_3"><label for="q2_3">3 - Good</label></div>
                    <div class="rating-option"><input type="radio" name="growth_analytical_skills" value="4" id="q2_4"><label for="q2_4">4 - Very Good</label></div>
                    <div class="rating-option"><input type="radio" name="growth_analytical_skills" value="5" id="q2_5"><label for="q2_5">5 - Excellent</label></div>
                </div>
            </div>

            <div class="form-group">
                <label>Capacity Building to design engineering solutions? <span class="required">*</span></label>
                <div class="rating-scale">
                    <div class="rating-option"><input type="radio" name="capacity_building" value="1" id="q3_1" required><label for="q3_1">1 - Poor</label></div>
                    <div class="rating-option"><input type="radio" name="capacity_building" value="2" id="q3_2"><label for="q3_2">2 - Average</label></div>
                    <div class="rating-option"><input type="radio" name="capacity_building" value="3" id="q3_3"><label for="q3_3">3 - Good</label></div>
                    <div class="rating-option"><input type="radio" name="capacity_building" value="4" id="q3_4"><label for="q3_4">4 - Very Good</label></div>
                    <div class="rating-option"><input type="radio" name="capacity_building" value="5" id="q3_5"><label for="q3_5">5 - Excellent</label></div>
                </div>
            </div>

            <div class="form-group">
                <label>Demonstration of practical classes? <span class="required">*</span></label>
                <div class="rating-scale">
                    <div class="rating-option"><input type="radio" name="practical_classes" value="1" id="q4_1" required><label for="q4_1">1 - Poor</label></div>
                    <div class="rating-option"><input type="radio" name="practical_classes" value="2" id="q4_2"><label for="q4_2">2 - Average</label></div>
                    <div class="rating-option"><input type="radio" name="practical_classes" value="3" id="q4_3"><label for="q4_3">3 - Good</label></div>
                    <div class="rating-option"><input type="radio" name="practical_classes" value="4" id="q4_4"><label for="q4_4">4 - Very Good</label></div>
                    <div class="rating-option"><input type="radio" name="practical_classes" value="5" id="q4_5"><label for="q4_5">5 - Excellent</label></div>
                </div>
            </div>

            <div class="form-group">
                <label>Content beyond Syllabus to be ready for industry & society? <span class="required">*</span></label>
                <div class="rating-scale">
                    <div class="rating-option"><input type="radio" name="beyond_syllabus" value="1" id="q5_1" required><label for="q5_1">1 - Never</label></div>
                    <div class="rating-option"><input type="radio" name="beyond_syllabus" value="2" id="q5_2"><label for="q5_2">2 - Unlikely</label></div>
                    <div class="rating-option"><input type="radio" name="beyond_syllabus" value="3" id="q5_3"><label for="q5_3">3 - Maybe</label></div>
                    <div class="rating-option"><input type="radio" name="beyond_syllabus" value="4" id="q5_4"><label for="q5_4">4 - Likely</label></div>
                    <div class="rating-option"><input type="radio" name="beyond_syllabus" value="5" id="q5_5"><label for="q5_5">5 - Definitely</label></div>
                </div>
            </div>

             <div class="form-group">
                <label>Opportunities to develop team spirit in Institution activities & student-teacher relationships? <span class="required">*</span></label>
                <div class="rating-scale">
                    <div class="rating-option"><input type="radio" name="team_spirit" value="1" id="q6_1" required><label for="q6_1">1 - Never</label></div>
                    <div class="rating-option"><input type="radio" name="team_spirit" value="2" id="q6_2"><label for="q6_2">2 - Unlikely</label></div>
                    <div class="rating-option"><input type="radio" name="team_spirit" value="3" id="q6_3"><label for="q6_3">3 - Maybe</label></div>
                    <div class="rating-option"><input type="radio" name="team_spirit" value="4" id="q6_4"><label for="q6_4">4 - Likely</label></div>
                    <div class="rating-option"><input type="radio" name="team_spirit" value="5" id="q6_5"><label for="q6_5">5 - Definitely</label></div>
                </div>
            </div>

            <div class="form-group">
                <label>What areas need improvement? (Select all that apply)</label>
                <div class="checkbox-group">
                    <label><input type="checkbox" name="improvements" value="Placement Cell"> Placement Cell</label>
                    <label><input type="checkbox" name="improvements" value="Curriculum Update"> Curriculum Update</label>
                    <label><input type="checkbox" name="improvements" value="Industry Exposure & Training"> Industry Exposure & Training</label>
                    <label><input type="checkbox" name="improvements" value="Skill Development"> Skill Development</label>
                    <label><input type="checkbox" name="improvements" value="Infrastructure"> Infrastructure</label>
                    <label><input type="checkbox" name="improvements" value="Internship Opportunities"> Internship Opportunities</label>
                </div>
            </div>

             <div class="form-group">
                <label>Overall Learning enviroment to facilities ananlysis of Engineering Problems? <span class="required">*</span></label>
                <div class="rating-scale">
                    <div class="rating-option"><input type="radio" name="learning_environment" value="1" id="q5_1" required><label for="q5_1">1 - Never</label></div>
                    <div class="rating-option"><input type="radio" name="learning_environment" value="2" id="q5_2"><label for="q5_2">2 - Unlikely</label></div>
                    <div class="rating-option"><input type="radio" name="learning_environment" value="3" id="q5_3"><label for="q5_3">3 - Maybe</label></div>
                    <div class="rating-option"><input type="radio" name="learning_environment" value="4" id="q5_4"><label for="q5_4">4 - Likely</label></div>
                    <div class="rating-option"><input type="radio" name="learning_environment" value="5" id="q5_5"><label for="q5_5">5 - Definitely</label></div>
                </div>
            </div>

                 <div class="form-group">
                <label>Facilities available to incorporate methodological training in the field of electronics? <span class="required">*</span></label>
                <div class="rating-scale">
                    <div class="rating-option"><input type="radio" name="facilities" value="1" id="q5_1" required><label for="q5_1">1 - Never</label></div>
                    <div class="rating-option"><input type="radio" name="facilities" value="2" id="q5_2"><label for="q5_2">2 - Unlikely</label></div>
                    <div class="rating-option"><input type="radio" name="facilities" value="3" id="q5_3"><label for="q5_3">3 - Maybe</label></div>
                    <div class="rating-option"><input type="radio" name="facilities" value="4" id="q5_4"><label for="q5_4">4 - Likely</label></div>
                    <div class="rating-option"><input type="radio" name="facilities" value="5" id="q5_5"><label for="q5_5">5 - Definitely</label></div>
                </div>
            </div>

            <div class="form-group">
                <label>Any suggestions or final thoughts?</label>
                <textarea name="comments" placeholder="Share your suggestions for future batches..."></textarea>
            </div>

            <button type="submit" class="btn">Submit Feedback</button>
        </form>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('user') || 'null');
        if (!user) window.location.href = 'index.html';

        const form = document.getElementById('exitForm');
        form.name.value = user.name;
        form.email.value = user.email;
        form.registration_number.value = user.registration_no;
        form.name.readOnly = true;
        form.email.readOnly = true;
        form.registration_number.readOnly = true;

        // Load existing feedback
        fetch('/api/feedback/exit/' + encodeURIComponent(user.registration_no))
            .then(r => r.json())
            .then(({ feedback: fb }) => {
                if (!fb) return;
                form.department.value = fb.department;
                form.year_of_passing.value = fb.year_of_passing;
                const radios = ['basic_discipline_knowledge','growth_analytical_skills','capacity_building','practical_classes','beyond_syllabus','team_spirit','learning_environment','facilities'];
                radios.forEach(n => { const r = form.querySelector(`input[name="${n}"][value="${fb[n]}"]`); if (r) r.checked = true; });
                if (fb.improvements) fb.improvements.split(', ').forEach(v => { const c = form.querySelector(`input[name="improvements"][value="${v}"]`); if (c) c.checked = true; });
                form.comments.value = fb.comments || '';
            });

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            const data = {
                name: formData.get('name'),
                email: formData.get('email'),
                registration_number: formData.get('registration_number'),
                department: formData.get('department'),
                year_of_passing: formData.get('year_of_passing'),
                basic_discipline_knowledge: parseInt(formData.get('basic_discipline_knowledge')),
                growth_analytical_skills: parseInt(formData.get('growth_analytical_skills')),
                capacity_building: parseInt(formData.get('capacity_building')),
                practical_classes: parseInt(formData.get('practical_classes')),
                beyond_syllabus: parseInt(formData.get('beyond_syllabus')),
                team_spirit: parseInt(formData.get('team_spirit')),
                improvements: formData.getAll('improvements').join(', '),
                learning_environment: parseInt(formData.get('learning_environment')),
                facilities: parseInt(formData.get('facilities')),
                comments: formData.get('comments') || ''
            };
            try {
                const response = await fetch('/submit-exit-feedback', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                if (response.ok) window.location.href = 'success.html';
                else alert(result.error || 'Error submitting form');
            } catch (error) {
                alert('Server not running. Please start the server with: node server.js');
            }
        });
    </script>
</body>
</html>
