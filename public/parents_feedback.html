<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parents Feedback</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh; padding: 2rem 1rem;
        }
        .container {
            background: white; padding: 2rem; border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); max-width: 700px; margin: 0 auto;
        }
        h1 { text-align: center; color: #1e3c72; margin-bottom: 0.5rem; }
        .logo { display: block; width: 70px; height: 70px; border-radius: 50%; margin: 0 auto 1rem; }
        .subtitle { text-align: center; color: #666; margin-bottom: 2rem; font-size: 0.9rem; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; color: #333; font-weight: bold; }
        .required { color: red; }
        input, select, textarea {
            width: 100%; padding: 0.75rem; border: 2px solid #ddd;
            border-radius: 5px; font-size: 1rem;
        }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #2a5298; }
        textarea { resize: vertical; min-height: 100px; }
        .checkbox-group { display: flex; flex-direction: column; gap: 0.5rem; }
        .checkbox-group label { font-weight: normal; display: flex; align-items: center; gap: 0.5rem; }
        .checkbox-group input { width: auto; }
        .rating-scale { display: flex; justify-content: space-between; gap: 0.5rem; flex-wrap: wrap; }
        .rating-option { flex: 1; min-width: 60px; text-align: center; }
        .rating-option input { width: auto; margin-bottom: 0.25rem; }
        .rating-option label { font-weight: normal; font-size: 0.85rem; }
        .btn {
            background: linear-gradient(135deg, #d24419 0%, #2a5298 100%);
            color: rgba(255, 255, 255, 0.689); padding: 0.75rem 2rem;
            border: none; border-radius: 5px; font-size: 1rem;
            cursor: pointer; width: 100%; margin-top: 1rem;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        @media (max-width: 500px) {
            .container { padding: 1.2rem; }
            h1 { font-size: 1.2rem; }
            .rating-scale { flex-wrap: wrap; gap: 0.3rem; }
            .rating-option { min-width: 45px; flex: none; width: 18%; }
            .rating-option label { font-size: 0.7rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <img class="logo" src="https://media.licdn.com/dms/image/v2/D560BAQE0gkaI7igpTQ/company-logo_200_200/company-logo_200_200/0/1714675006411?e=2147483647&v=beta&t=FOBBkM2wfmBgrmITordnRweYfk-42d1BO9ccRoDquS0" alt="Logo">
        <h1>Parents Feedback Form</h1>
        <p class="subtitle">Help us improve by sharing your valuable feedback as a parent</p>

        <form id="parentsForm">
            <div class="form-group">
                <label>Student Name <span class="required">*</span></label>
                <input type="text" name="student_name" required>
            </div>
            <div class="form-group">
                <label>Parents Name <span class="required">*</span></label>
                <input type="text" name="name" required>
            </div>
            <div class="form-group">
                <label>Email <span class="required">*</span></label>
                <input type="email" name="email" required>
            </div>
            <div class="form-group">
                <label>Registration Number <span class="required">*</span></label>
                <input type="text" name="registration_number" required>
            </div>
            <div class="form-group">
                <label>Department <span class="required">*</span></label>
                <select name="department" required>
                    <option value="">Select Department</option>
                    <option value="ARCHITECTURAL ASSISTANTSHIP">ARCHITECTURAL ASSISTANTSHIP</option>
                    <option value="BEAUTY CULTURE">BEAUTY CULTURE</option>
                    <option value="CIVIL ENGINEERING">CIVIL ENGINEERING</option>
                    <option value="ELECTRICAL ENGINEERING">ELECTRICAL ENGINEERING</option>
                    <option value="ELECTRONICS & TELECOMMUNICATION ENGINEERING">ELECTRONICS & TELECOMMUNICATION ENGINEERING</option>
                    <option value="PHARMACY">PHARMACY</option>
                    <option value="INFORMATION TECHNOLOGY">INFORMATION TECHNOLOGY</option>
                    <option value="MODERN OFFICE MANAGEMENT">MODERN OFFICE MANAGEMENT</option>
                    <option value="MECHANICAL ENGINEERING">MECHANICAL ENGINEERING</option>
                    <option value="OTHER">OTHER</option>
                </select>
            </div>
            <div class="form-group">
                <label>Academic Year <span class="required">*</span></label>
                <select name="academic_year" required>
                    <option value="">Select Year</option>
                    <option value="2022-2025">2022-2025</option>
                    <option value="2023-2026">2023-2026</option>
                    <option value="2024-2027">2024-2027</option>
                    <option value="2025-2028">2025-2028</option>
                </select>
            </div>

            <div class="form-group">
                <label>Teaching Learning Methodology? <span class="required">*</span></label>
                <div class="rating-scale">
                    <div class="rating-option"><input type="radio" name="teaching_learning" value="1" id="q1_1" required><label for="q1_1">1 - Poor</label></div>
                    <div class="rating-option"><input type="radio" name="teaching_learning" value="2" id="q1_2"><label for="q1_2">2 - Average</label></div>
                    <div class="rating-option"><input type="radio" name="teaching_learning" value="3" id="q1_3"><label for="q1_3">3 - Good</label></div>
                    <div class="rating-option"><input type="radio" name="teaching_learning" value="4" id="q1_4"><label for="q1_4">4 - Very Good</label></div>
                    <div class="rating-option"><input type="radio" name="teaching_learning" value="5" id="q1_5"><label for="q1_5">5 - Excellent</label></div>
                </div>
            </div>

            <div class="form-group">
                <label>Students Interaction? <span class="required">*</span></label>
                <div class="rating-scale">
                    <div class="rating-option"><input type="radio" name="students_interaction" value="1" id="q2_1" required><label for="q2_1">1 - Poor</label></div>
                    <div class="rating-option"><input type="radio" name="students_interaction" value="2" id="q2_2"><label for="q2_2">2 - Average</label></div>
                    <div class="rating-option"><input type="radio" name="students_interaction" value="3" id="q2_3"><label for="q2_3">3 - Good</label></div>
                    <div class="rating-option"><input type="radio" name="students_interaction" value="4" id="q2_4"><label for="q2_4">4 - Very Good</label></div>
                    <div class="rating-option"><input type="radio" name="students_interaction" value="5" id="q2_5"><label for="q2_5">5 - Excellent</label></div>
                </div>
            </div>

            <div class="form-group">
                <label>Academic Facilities? <span class="required">*</span></label>
                <div class="rating-scale">
                    <div class="rating-option"><input type="radio" name="academic_facilities" value="1" id="q3_1" required><label for="q3_1">1 - Poor</label></div>
                    <div class="rating-option"><input type="radio" name="academic_facilities" value="2" id="q3_2"><label for="q3_2">2 - Average</label></div>
                    <div class="rating-option"><input type="radio" name="academic_facilities" value="3" id="q3_3"><label for="q3_3">3 - Good</label></div>
                    <div class="rating-option"><input type="radio" name="academic_facilities" value="4" id="q3_4"><label for="q3_4">4 - Very Good</label></div>
                    <div class="rating-option"><input type="radio" name="academic_facilities" value="5" id="q3_5"><label for="q3_5">5 - Excellent</label></div>
                </div>
            </div>

            <div class="form-group">
                <label>Student's Discipline? <span class="required">*</span></label>
                <div class="rating-scale">
                    <div class="rating-option"><input type="radio" name="students_discipline" value="1" id="q4_1" required><label for="q4_1">1 - Poor</label></div>
                    <div class="rating-option"><input type="radio" name="students_discipline" value="2" id="q4_2"><label for="q4_2">2 - Average</label></div>
                    <div class="rating-option"><input type="radio" name="students_discipline" value="3" id="q4_3"><label for="q4_3">3 - Good</label></div>
                    <div class="rating-option"><input type="radio" name="students_discipline" value="4" id="q4_4"><label for="q4_4">4 - Very Good</label></div>
                    <div class="rating-option"><input type="radio" name="students_discipline" value="5" id="q4_5"><label for="q4_5">5 - Excellent</label></div>
                </div>
            </div>

            <div class="form-group">
                <label>Overall Facilities? <span class="required">*</span></label>
                <div class="rating-scale">
                    <div class="rating-option"><input type="radio" name="overall_facilities" value="1" id="q5_1" required><label for="q5_1">1 - Poor</label></div>
                    <div class="rating-option"><input type="radio" name="overall_facilities" value="2" id="q5_2"><label for="q5_2">2 - Average</label></div>
                    <div class="rating-option"><input type="radio" name="overall_facilities" value="3" id="q5_3"><label for="q5_3">3 - Good</label></div>
                    <div class="rating-option"><input type="radio" name="overall_facilities" value="4" id="q5_4"><label for="q5_4">4 - Very Good</label></div>
                    <div class="rating-option"><input type="radio" name="overall_facilities" value="5" id="q5_5"><label for="q5_5">5 - Excellent</label></div>
                </div>
            </div>

            <div class="form-group">
                <label>Career Guidance? <span class="required">*</span></label>
                <div class="rating-scale">
                    <div class="rating-option"><input type="radio" name="career_guidance" value="1" id="q6_1" required><label for="q6_1">1 - Never</label></div>
                    <div class="rating-option"><input type="radio" name="career_guidance" value="2" id="q6_2"><label for="q6_2">2 - Unlikely</label></div>
                    <div class="rating-option"><input type="radio" name="career_guidance" value="3" id="q6_3"><label for="q6_3">3 - Maybe</label></div>
                    <div class="rating-option"><input type="radio" name="career_guidance" value="4" id="q6_4"><label for="q6_4">4 - Likely</label></div>
                    <div class="rating-option"><input type="radio" name="career_guidance" value="5" id="q6_5"><label for="q6_5">5 - Definitely</label></div>
                </div>
            </div>

            <div class="form-group">
                <label>Placement Drive? (Select all that apply)</label>
                <div class="checkbox-group">
                    <label><input type="checkbox" name="placement_drive" value="Teaching Quality"> Teaching Quality</label>
                    <label><input type="checkbox" name="placement_drive" value="Safety & Discipline"> Safety & Discipline</label>
                    <label><input type="checkbox" name="placement_drive" value="Parent-Teacher Communication"> Parent-Teacher Communication</label>
                    <label><input type="checkbox" name="placement_drive" value="Infrastructure"> Infrastructure</label>
                    <label><input type="checkbox" name="placement_drive" value="Placement Support"> Placement Support</label>
                    <label><input type="checkbox" name="placement_drive" value="Extracurricular Activities"> Extracurricular Activities</label>
                </div>
            </div>

            <div class="form-group">
                <label>Internship Program? (Select all that apply)</label>
                <div class="checkbox-group">
                    <label><input type="checkbox" name="internship_program" value="Teaching Quality"> Teaching Quality</label>
                    <label><input type="checkbox" name="internship_program" value="Safety & Discipline"> Safety & Discipline</label>
                    <label><input type="checkbox" name="internship_program" value="Parent-Teacher Communication"> Parent-Teacher Communication</label>
                    <label><input type="checkbox" name="internship_program" value="Infrastructure"> Infrastructure</label>
                    <label><input type="checkbox" name="internship_program" value="Placement Support"> Placement Support</label>
                    <label><input type="checkbox" name="internship_program" value="Extracurricular Activities"> Extracurricular Activities</label>
                </div>
            </div>

            <div class="form-group">
                <label>Extracurricular Activities? (Select all that apply)</label>
                <div class="checkbox-group">
                    <label><input type="checkbox" name="extracurricular_activities" value="Teaching Quality"> Teaching Quality</label>
                    <label><input type="checkbox" name="extracurricular_activities" value="Safety & Discipline"> Safety & Discipline</label>
                    <label><input type="checkbox" name="extracurricular_activities" value="Parent-Teacher Communication"> Parent-Teacher Communication</label>
                    <label><input type="checkbox" name="extracurricular_activities" value="Infrastructure"> Infrastructure</label>
                    <label><input type="checkbox" name="extracurricular_activities" value="Placement Support"> Placement Support</label>
                    <label><input type="checkbox" name="extracurricular_activities" value="Extracurricular Activities"> Extracurricular Activities</label>
                </div>
            </div>

            <div class="form-group">
                <label>Satisfaction level with curriculum? (Select all that apply)</label>
                <div class="checkbox-group">
                    <label><input type="checkbox" name="curriculum_satisfaction" value="Teaching Quality"> Teaching Quality</label>
                    <label><input type="checkbox" name="curriculum_satisfaction" value="Safety & Discipline"> Safety & Discipline</label>
                    <label><input type="checkbox" name="curriculum_satisfaction" value="Parent-Teacher Communication"> Parent-Teacher Communication</label>
                    <label><input type="checkbox" name="curriculum_satisfaction" value="Infrastructure"> Infrastructure</label>
                    <label><input type="checkbox" name="curriculum_satisfaction" value="Placement Support"> Placement Support</label>
                    <label><input type="checkbox" name="curriculum_satisfaction" value="Extracurricular Activities"> Extracurricular Activities</label>
                </div>
            </div>

            <div class="form-group">
                <label>Any suggestions or comments?</label>
                <textarea name="comments" placeholder="Share your suggestions or concerns..."></textarea>
            </div>

            <button type="submit" class="btn">Submit Feedback</button>
        </form>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('user') || 'null');
        if (!user) window.location.href = 'index.html';

        const form = document.getElementById('parentsForm');
        form.querySelector('input[name="student_name"]').value = user.name;
        form.querySelector('input[name="student_name"]').readOnly = true;
        form.querySelector('input[name="email"]').value = user.email;
        form.querySelector('input[name="email"]').readOnly = true;
        form.querySelector('input[name="registration_number"]').value = user.registration_no;
        form.querySelector('input[name="registration_number"]').readOnly = true;

        fetch('/api/feedback/parents/' + encodeURIComponent(user.registration_no))
            .then(r => r.json())
            .then(({ feedback: fb }) => {
                if (!fb) return;
                form.student_name.value = fb.student_name || '';
                form.department.value = fb.department;
                form.academic_year.value = fb.academic_year;
                const radios = ['teaching_learning','students_interaction','academic_facilities','students_discipline','overall_facilities','career_guidance'];
                radios.forEach(n => { const r = form.querySelector(`input[name="${n}"][value="${fb[n]}"]`); if (r) r.checked = true; });
                ['placement_drive','internship_program','extracurricular_activities','curriculum_satisfaction'].forEach(n => {
                    if (fb[n]) fb[n].split(', ').forEach(v => { const c = form.querySelector(`input[name="${n}"][value="${v}"]`); if (c) c.checked = true; });
                });
                form.comments.value = fb.comments || '';
            });

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            const data = {
                name: formData.get('name'),
                student_name: formData.get('student_name'),
                email: formData.get('email'),
                registration_number: formData.get('registration_number'),
                department: formData.get('department'),
                academic_year: formData.get('academic_year'),
                teaching_learning: parseInt(formData.get('teaching_learning')),
                students_interaction: parseInt(formData.get('students_interaction')),
                academic_facilities: parseInt(formData.get('academic_facilities')),
                students_discipline: parseInt(formData.get('students_discipline')),
                overall_facilities: parseInt(formData.get('overall_facilities')),
                career_guidance: parseInt(formData.get('career_guidance')),
                placement_drive: formData.getAll('placement_drive').join(', '),
                internship_program: formData.getAll('internship_program').join(', '),
                extracurricular_activities: formData.getAll('extracurricular_activities').join(', '),
                curriculum_satisfaction: formData.getAll('curriculum_satisfaction').join(', '),
                comments: formData.get('comments') || ''
            };
            try {
                const response = await fetch('/submit-parents-feedback', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                if (response.ok) window.location.href = 'success.html';
                else alert(result.error || 'Error submitting form');
            } catch (error) {
                alert('Server not running. Please start the server with: node server.js');
            }
        });
    </script>
</body>
</html>
