<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Portal - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            overflow: hidden;
        }
        .bg-circles {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0;
        }
        .bg-circles div {
            position: absolute; border-radius: 50%; opacity: 0.07;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }
        .bg-circles .c1 { width: 400px; height: 400px; top: -100px; left: -100px; }
        .bg-circles .c2 { width: 300px; height: 300px; bottom: -50px; right: -50px; }
        .bg-circles .c3 { width: 200px; height: 200px; top: 50%; left: 60%; }

        .card {
            position: relative; z-index: 1;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 2.5rem 2rem;
            width: 420px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
        }
        .card h1 {
            text-align: center;
            color: #fff;
            font-size: 1.8rem;
            margin-bottom: 0.3rem;
        }
        .card .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }
        .tabs {
            display: flex;
            margin-bottom: 1.5rem;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            overflow: hidden;
        }
        .tabs button {
            flex: 1;
            padding: 0.7rem;
            border: none;
            background: transparent;
            color: rgba(255,255,255,0.5);
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .tabs button.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            font-weight: bold;
        }
        .form-group {
            margin-bottom: 1.2rem;
        }
        .form-group label {
            display: block;
            color: rgba(255,255,255,0.7);
            font-size: 0.85rem;
            margin-bottom: 0.4rem;
        }
        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            background: rgba(255,255,255,0.07);
            color: #fff;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        .form-group input::placeholder { color: rgba(255,255,255,0.3); }
        .form-group input:focus {
            outline: none;
            border-color: #764ba2;
            box-shadow: 0 0 15px rgba(118,75,162,0.3);
        }
        .btn {
            width: 100%;
            padding: 0.85rem;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 0.5rem;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102,126,234,0.4);
        }
        .error {
            color: #ff6b6b;
            text-align: center;
            font-size: 0.85rem;
            margin-top: 0.5rem;
            min-height: 1.2rem;
        }
        .hidden { display: none; }
        .role-toggle {
            display: flex; gap: 0.5rem;
        }
        .role-option {
            flex: 1; text-align: center; padding: 0.6rem;
            border: 1px solid rgba(255,255,255,0.15); border-radius: 10px;
            color: rgba(255,255,255,0.5); cursor: pointer; font-size: 0.9rem;
            transition: all 0.3s;
        }
        .role-option input { display: none; }
        .role-option.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff; border-color: transparent;
        }
        .admin-link {
            text-align: center; margin-top: 1.5rem;
        }
        .admin-link a {
            color: rgba(255,255,255,0.4); font-size: 0.85rem; text-decoration: none;
            transition: color 0.3s;
        }
        .admin-link a:hover { color: #764ba2; }
        .pw-wrapper {
            position: relative;
        }
        .pw-wrapper input { padding-right: 2.5rem; }
        .pw-toggle {
            position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%);
            background: none; border: none; color: rgba(255,255,255,0.4);
            cursor: pointer; font-size: 1.1rem; padding: 0;
        }
        .pw-toggle:hover { color: rgba(255,255,255,0.7); }
        .forgot-link {
            text-align: right; margin-top: 0.3rem;
        }
        .forgot-link a {
            color: rgba(255,255,255,0.4); font-size: 0.8rem; text-decoration: none;
        }
        .forgot-link a:hover { color: #764ba2; }
        .success-msg {
            color: #43e97b; text-align: center; font-size: 0.85rem;
            margin-top: 0.5rem; min-height: 1.2rem;
        }
        @media (max-width: 480px) {
            .card { width: 95%; padding: 1.5rem 1.2rem; }
            .card h1 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
    <div class="bg-circles">
        <div class="c1"></div><div class="c2"></div><div class="c3"></div>
    </div>
    <div class="card">
        <h1>📝 Feedback Portal</h1>
        <p class="subtitle">Sign in to share your feedback</p>
        <div class="tabs">
            <button class="active" onclick="switchTab('login')">Login</button>
            <button onclick="switchTab('signup')">Sign Up</button>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="pw-wrapper">
                    <input type="password" name="password" placeholder="••••••••" required>
                    <button type="button" class="pw-toggle" onclick="togglePw(this)">👁</button>
                </div>
                <div class="forgot-link"><a href="#" onclick="showForgot()">Forgot Password?</a></div>
            </div>
            <button type="submit" class="btn">Login</button>
            <p class="error" id="loginError"></p>
        </form>

        <form id="forgotForm" class="hidden" onsubmit="handleForgot(event)">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="Enter your registered email" required>
            </div>
            <div class="form-group">
                <label>Registration No</label>
                <input type="text" name="registration_no" placeholder="Enter your registration number" required>
            </div>
            <div class="form-group">
                <label>New Password</label>
                <div class="pw-wrapper">
                    <input type="password" name="new_password" placeholder="••••••••" minlength="6" required>
                    <button type="button" class="pw-toggle" onclick="togglePw(this)">👁</button>
                </div>
            </div>
            <button type="submit" class="btn">word</button>
            <p class="error" id="forgotError"></p>
            <p class="success-msg" id="forgotSuccess"></p>
            <div class="forgot-link" style="text-align:center; margin-top:1rem;"><a href="#" onclick="switchTab('login')">← Back to Login</a></div>
        </form>

        <form id="signupForm" class="hidden" onsubmit="handleSignup(event)">
            <div class="form-group">
                <label>I am a</label>
                <div class="role-toggle">
                    <label class="role-option active">
                        <input type="radio" name="role" value="student" checked onchange="toggleRegNo()"> Student
                    </label>
                    <label class="role-option">
                        <input type="radio" name="role" value="admin" onchange="toggleRegNo()"> Admin
                    </label>
                </div>
            </div>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" placeholder="Enter your full name" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group" id="regNoGroup">
                <label>Registration No</label>
                <input type="text" name="registration_no" placeholder="Enter your registration number" required>
            </div>
            <div class="form-group hidden" id="adminCodeGroup">
                <label>Admin Secret Code</label>
                <input type="password" name="admin_code" placeholder="Enter admin code">
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="pw-wrapper">
                    <input type="password" name="password" placeholder="••••••••" minlength="6" required>
                    <button type="button" class="pw-toggle" onclick="togglePw(this)">👁</button>
                </div>
            </div>
            <button type="submit" class="btn">Create Account</button>
            <p class="error" id="signupError"></p>
        </form>
        <div class="admin-link">
            <a href="index.html?admin=1">🔐 Admin Login</a>
        </div>
    </div>

    <script>
        function toggleRegNo() {
            const isAdmin = document.querySelector('input[name="role"]:checked').value === 'admin';
            document.getElementById('regNoGroup').style.display = isAdmin ? 'none' : 'block';
            document.getElementById('regNoGroup').querySelector('input').required = !isAdmin;
            document.getElementById('adminCodeGroup').classList.toggle('hidden', !isAdmin);
            document.getElementById('adminCodeGroup').querySelector('input').required = isAdmin;
            document.querySelectorAll('.role-option').forEach(el =>
                el.classList.toggle('active', el.querySelector('input').checked)
            );
        }

        function togglePw(btn) {
            const input = btn.previousElementSibling;
            const isPassword = input.type === 'password';
            input.type = isPassword ? 'text' : 'password';
            btn.textContent = isPassword ? '🙈' : '👁';
        }

        function showForgot() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('signupForm').classList.add('hidden');
            document.getElementById('forgotForm').classList.remove('hidden');
            document.querySelector('.tabs').style.display = 'none';
            document.querySelector('.card h1').textContent = '🔑 word';
            document.querySelector('.card .subtitle').textContent = 'Verify your identity to word';
        }

        function switchTab(tab) {
            document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
            document.getElementById('signupForm').classList.toggle('hidden', tab !== 'signup');
            document.getElementById('forgotForm').classList.add('hidden');
            document.querySelector('.tabs').style.display = 'flex';
            document.querySelector('.card h1').textContent = '📝 Feedback Portal';
            document.querySelector('.card .subtitle').textContent = 'Sign in to share your feedback';
            document.querySelectorAll('.tabs button').forEach((btn, i) => {
                btn.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'signup' && i === 1));
            });
        }

        // Auto-switch to login-only mode if ?admin=1
        if (new URLSearchParams(location.search).get('admin') === '1') {
            document.querySelector('.card h1').textContent = '🔐 Admin Login';
            document.querySelector('.card .subtitle').textContent = 'Sign in to access the admin dashboard';
            document.querySelector('.tabs').style.display = 'none';
            document.getElementById('signupForm').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
            document.querySelector('.admin-link').innerHTML = '<a href="index.html">← Back to Student Login</a>';
        }

        async function handleForgot(e) {
            e.preventDefault();
            const form = new FormData(e.target);
            document.getElementById('forgotError').textContent = '';
            document.getElementById('forgotSuccess').textContent = '';
            try {
                const res = await fetch('/api/reset-password', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email: form.get('email'), registration_no: form.get('registration_no'), new_password: form.get('new_password') })
                });
                const data = await res.json();
                if (res.ok) {
                    document.getElementById('forgotSuccess').textContent = 'Password reset successful! Redirecting...';
                    setTimeout(() => switchTab('login'), 2000);
                } else {
                    document.getElementById('forgotError').textContent = data.error;
                }
            } catch { document.getElementById('forgotError').textContent = 'Server not running'; }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const form = new FormData(e.target);
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email: form.get('email'), password: form.get('password') })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = data.user.role === 'admin' ? 'admin.html' : 'home.html';
                } else {
                    document.getElementById('loginError').textContent = data.error;
                }
            } catch { document.getElementById('loginError').textContent = 'Server not running'; }
        }

        async function handleSignup(e) {
            e.preventDefault();
            const form = new FormData(e.target);
            const role = form.get('role');
            try {
                const res = await fetch('/api/signup', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ name: form.get('name'), email: form.get('email'), registration_no: role === 'admin' ? '' : form.get('registration_no'), role, admin_code: form.get('admin_code') || '', password: form.get('password') })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = role === 'admin' ? 'admin.html' : 'home.html';
                } else {
                    document.getElementById('signupError').textContent = data.error;
                }
            } catch { document.getElementById('signupError').textContent = 'Server not running'; }
        }
    </script>
</body>
</html>
